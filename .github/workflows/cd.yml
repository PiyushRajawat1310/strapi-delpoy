name: CD - Deploy to AWS

on:
  workflow_run:
    workflows: ["CI - Build & Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve -var="key_name=${{ secrets.KEY_NAME }}"

      - name: Get Public IP
        id: ip
        run: echo "IP=$(terraform -chdir=terraform output -raw public_ip)" >> $GITHUB_ENV

      - name: SSH & Deploy Container
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ env.IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/strapi-app:latest
            docker stop strapi || true
            docker rm strapi || true
            docker run -d -p 1337:1337 --name strapi --restart always ${{ secrets.DOCKER_USERNAME }}/strapi-app:latest
